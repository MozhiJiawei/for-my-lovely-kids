services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    image: red-flower-garden-api:local
    container_name: red-flower-garden-api
    restart: unless-stopped
    env_file:
      - deploy/api.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages/domain/src:/app/packages/domain/src:ro
      - red-flower-data:/data

volumes:
  red-flower-data:
